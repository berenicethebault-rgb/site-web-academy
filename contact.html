<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=BBH+Hegarty&family=Bangers&family=Barrio&family=Climate+Crisis:YEAR@1979&family=Dynalight&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Lobster&family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&family=Niconne&family=Patua+One&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Rubik+Mono+One&family=Sekuya&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Stalinist+One&display=swap");
    </style>
  </head>
  <body>
    <div class="nav-bar">
      <div class="logo">
        <a class="titre" href="index.html"> Atypiquement Amoureux.se </a>
      </div>
      <div class="liens">
        <a class="lien" href="agences.html">Rencontres</a>
        <a class="lien" href="temoignages.html">Témoignages</a>
        <a class="lien" href="contact.html">S'inscrire</a>
        <a class="lien profils" href="profils.html"> 🔎 Profils</a>
      </div>
    </div>

    <div class="contenu">
      <h1>S'inscrire aux activités :</h1>

      <div class="container">
        <input type="checkbox" id="sent-toggle" />

        <div class="formulaire">
          <label for="nom">Nom de famille :</label>
          <input type="text" id="nom" name="nom" />
          <br />
          <label for="prenom">Prénom :</label>
          <input type="text" id="prenom" name="prenom" />
          <section>
            <label for="age">Age : </label>
            <input type="number" min="18" max="99" />
          </section>

          <label>L'activité : </label>
          <textarea rows="4" placeholder="Aller à la plage" required></textarea>
          <div class="champ">
            <label for="ville">Ville :</label>
            <select id="villes" name="villes">
              <option value="marseilles">Marseille</option>
              <option value="lille">Lille</option>
              <option value="vannes">Vannes</option>
            </select>
          </div>
          <label>Votre email : </label>
          <input type="email" placeholder="Votre email" required />
          <label>Vos questions ?</label>
          <textarea rows="4" placeholder="Votre message" required></textarea>
          <label for="sent-toggle" class="btn">Envoyer</label>
        </div>

        <div id="success-message">Bien envoyé !</div>
      </div>
    </div>
    <footer>
      <p class="grand">© Tout droits réservés à Bérénice Thébault.</p>
      <p class="grand">Les images viennet de Unsplash et Flaticon.</p>
      <p class="grand">La typographie vient de Google Fonts.</p>
      <div class="row">
        <a class="lien bas" href="acceuil.html">Acceuil</a>
        <a class="lien bas" href="agences.html">Rencontres</a>
        <a class="lien bas" href="temoignages.html">Témoignages</a>
        <a class="lien bas" href="contact.html">S'inscrire</a>
      </div>
      <a class="lien profils bas" href="profils.html"> 🔎 Profils</a>
    </footer>
  </body>
</html>
